<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <section id="login-page">
            <h2>Login</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <a href="#" id="show-register-link">Don't have an account? Register</a>
        </section>

        <section id="register-page" class="hidden">
            <h2>Register</h2>
            <form id="register-form">
                <input type="email" id="register-email" placeholder="Email" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <a href="#" id="show-login-link">Back to Login</a>
        </section>

        <section id="dashboard-page" class="hidden">
            <header>
                <h2>My To-Do List</h2>
                <button id="logout-btn">Logout</button>
            </header>

            <div class="profile-section">
                <h3>Profile</h3>
                <img id="avatar-img" src="https://placehold.co/100" alt="Avatar">
                <input type="file" id="avatar-upload-input">
                <button id="avatar-upload-btn">Upload New Picture</button>
                <button id="avatar-delete-btn" class="danger">Delete Picture</button>
            </div>

            <div class="todo-section">
                <h3>Add a New Task</h3>
                <form id="todo-form">
                    <input type="text" id="todo-title-input" placeholder="What's your task?" required>
                    <button type="submit">Add Task</button>
                </form>
                
                <h3>Your Tasks</h3>
                <ul id="todo-list">
                    </ul>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
